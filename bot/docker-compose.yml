

services:
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot_rag
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').getcode() == 200 else 1)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
