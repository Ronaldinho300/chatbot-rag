<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AsisBot - SENATI 2026</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-wrapper">
        <header>
            <div class="bot-info">
                <span class="material-symbols-outlined icon-bot">smart_toy</span>
                <div class="text-info">
                    <h2>AsisBot</h2>
                    <span class="status">En línea</span>
                </div>
            </div>
        </header>

        <div id="chat-content" class="chat-content">
            <div class="msg bot">¡Hola! Soy tu asistente de SENATI. ¿Tienes dudas sobre el documento?</div>
        </div>

        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Escribe tu mensaje aquí..." autocomplete="off">
            <button id="send-btn">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
